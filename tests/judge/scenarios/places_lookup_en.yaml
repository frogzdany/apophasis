id: places_lookup_en
description: |
  Place lookup with explicit location. Lucy should call one of the
  places providers (search_places or search_places_google), passing
  the user's location text as the `location` arg.
language: en
voiceName: Aoede
inputMode: text
searchPolicy: strict
turns:
  - kind: user
    text: "Find me a great pizza spot near Williamsburg, Brooklyn."
    toolMocks:
      search_places:
        results:
          - id: place-1
            kind: place
            title: "L'industrie Pizzeria"
            subtitle: "Williamsburg, Brooklyn"
        count: 1
        kind: place
        summary: "1 mocked match."
      search_places_google:
        results:
          - id: place-1
            kind: place
            title: "L'industrie Pizzeria"
            subtitle: "Williamsburg, Brooklyn"
        count: 1
        kind: place
        summary: "1 mocked match."
    expect:
      # Either provider counts; we use a custom expectation in the
      # rubric. The deterministic axis just checks something fired.
      tools: []

rubric:
  description: |
    Lucy must call EITHER search_places OR search_places_google with
    a sensible "query" and a "location" arg derived from the user's
    free text. Calling render_surface, search_web, or anything else is
    wrong here. Voice reply optional; if present, one short English
    sentence.
  speakLanguage: en
  maxSentences: 1
