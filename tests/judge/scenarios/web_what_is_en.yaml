id: web_what_is_en
description: |
  Generic-knowledge query that doesn't fit a domain-specific provider.
  Lucy must route to search_web rather than guessing or rendering a
  panel.
language: en
voiceName: Aoede
inputMode: text
searchPolicy: strict
turns:
  - kind: user
    text: "What is photosynthesis, in one short sentence?"
    toolMocks:
      search_web:
        results:
          - id: web-1
            kind: web
            title: "Photosynthesis - Wikipedia"
            url: "https://en.wikipedia.org/wiki/Photosynthesis"
            description: "Photosynthesis is the process by which plants convert light energy into chemical energy."
        count: 1
        kind: web
        summary: "1 mocked match."
    expect:
      tools: [search_web]

rubric:
  description: |
    Lucy must call search_web (NOT render_surface, NOT search_music). A
    voice reply summarising the topic is welcome but optional. If she
    responds in voice it must be in English and one short sentence.
  speakLanguage: en
  maxSentences: 1
