id: video_search_en
description: |
  Direct YouTube routing — when the user asks for a specific video,
  Lucy should call search_video without any panel detour.
language: en
voiceName: Aoede
inputMode: text
searchPolicy: strict
turns:
  - kind: user
    text: "Find me the AlphaGo official trailer on YouTube."
    toolMocks:
      search_video:
        results:
          - id: yt-1
            kind: video
            title: "AlphaGo - The Movie | Full Documentary"
            subtitle: "DeepMind"
            url: "https://www.youtube.com/watch?v=WXuK6gekU1Y"
        count: 1
        kind: video
        summary: "1 mocked match."
    expect:
      tools: [search_video]

rubric:
  description: |
    Lucy must call search_video as the FIRST and (ideally) only tool.
    Calling render_surface here is wrong — the user's intent is clear.
    Voice reply optional; if present, English, one short sentence.
  speakLanguage: en
  maxSentences: 1
